<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-frontend</title>
  </head>
  <body>
    <div id="app">
      <style>
        .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .spinner { border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="color: #475569; font-weight: 500;">Initializing...</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
